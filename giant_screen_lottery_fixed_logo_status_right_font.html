<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>清华大学医学院第24届学生节 |【文医复兴】</title>
    <style>
        @font-face {
            font-family: "JinghuaLaoSong";
            src: url("./京華老宋体v3.0(1).ttf") format("truetype");
            font-weight: 400 900;
            font-style: normal;
            font-display: swap;
        }

        :root {
            --bg: #2b120e;
            --bg-2: #1a0a08;
            --screen: #efe2cd;
            --orange: #c65328;
            --orange-2: #e68a18;
            --gold: #ffbd4a;
            --green: #243a2f;
            --seat-idle: #d8d2c5;
            --winner: #f49a11;
            --text: #f5eadc;
            --muted: rgba(245, 234, 220, 0.66);
            --danger: #7f3223;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: "JinghuaLaoSong", "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at 50% 15%, rgba(198, 83, 40, 0.18), transparent 34%),
                radial-gradient(circle at 50% 82%, rgba(246, 154, 17, 0.18), transparent 28%),
                linear-gradient(180deg, var(--bg) 0%, var(--bg-2) 100%);
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background-image: var(--custom-bg, none);
            background-size: cover;
            background-position: center;
            opacity: 0.22;
            filter: blur(1px) saturate(0.9);
            z-index: -2;
        }

        body::after {
            content: "";
            position: fixed;
            inset: 0;
            background:
                linear-gradient(90deg, rgba(0, 0, 0, 0.55), transparent 22%, transparent 78%, rgba(0, 0, 0, 0.55)),
                linear-gradient(180deg, rgba(0, 0, 0, 0.2), rgba(0, 0, 0, 0.72));
            z-index: -1;
        }

        .app {
            width: min(100vw, calc(100vh * 9 / 5));
            height: min(100vh, calc(100vw * 5 / 9));
            margin: auto;
            display: grid;
            grid-template-rows: 8% 81% 11%;
            padding: 0.9% 1.4%;
            gap: 0.6%;
        }

        .topbar {
            display: grid;
            /* 左侧标题占主要空间，右侧依次放统计毛玻璃组件和图例，避免统计组件压到标题 */
            grid-template-columns: minmax(0, 1fr) auto auto;
            align-items: center;
            gap: 1.8vw;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 14px;
            min-width: 0;
        }

        .logo-mark {
            width: clamp(170px, 18vw, 319px);
            height: auto;
            flex: 0 0 auto;
            display: block;
            object-fit: contain;
            filter: drop-shadow(0 0 18px rgba(255, 255, 255, 0.18));
        }

        h1 {
            font-size: clamp(20px, 1.7vw, 40px);
            letter-spacing: 0.06em;
            color: var(--screen);
            text-shadow: 0 0 24px rgba(230, 138, 24, 0.35);
            white-space: nowrap;
        }

        .subtitle {
            font-size: clamp(11px, 0.72vw, 16px);
            color: var(--muted);
            margin-top: 4px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
        }

        .status-card {
            justify-self: end;
            margin-left: clamp(18px, 2.6vw, 56px);
            display: flex;
            align-items: center;
            gap: 20px;
            padding: 10px 20px;
            border-radius: 999px;
            background: rgba(245, 234, 220, 0.08);
            border: 1px solid rgba(245, 234, 220, 0.15);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08), 0 14px 40px rgba(0, 0, 0, 0.24);
        }

        .status-card strong {
            color: var(--gold);
            font-size: clamp(20px, 1.8vw, 34px);
            line-height: 1;
        }

        .status-card span {
            display: block;
            color: var(--muted);
            font-size: 13px;
            margin-top: 3px;
            letter-spacing: 0.1em;
        }

        .legend {
            justify-self: end;
            display: flex;
            gap: 14px;
            align-items: center;
            color: var(--muted);
            font-size: 14px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .dot {
            width: 16px;
            height: 16px;
            border-radius: 5px;
            background: var(--seat-idle);
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.3);
        }

        .dot.active {
            background: var(--orange-2);
            box-shadow: 0 0 14px rgba(230, 138, 24, 0.75);
        }

        .dot.winner {
            background: var(--winner);
            box-shadow: 0 0 16px rgba(244, 154, 17, 0.9);
        }

        .cinema {
            position: relative;
            display: grid;
            grid-template-rows: 1fr;
            align-items: stretch;
            border-radius: 34px;
            background:
                linear-gradient(180deg, rgba(255, 255, 255, 0.08), transparent 18%),
                linear-gradient(180deg, rgba(36, 58, 47, 0.68), rgba(31, 15, 12, 0.88));
            border: 2px solid rgba(198, 83, 40, 0.55);
            box-shadow:
                inset 0 0 70px rgba(0, 0, 0, 0.58),
                0 28px 80px rgba(0, 0, 0, 0.42);
            overflow: hidden;
            padding: 0.7% 1.1% 0.25%;
        }

        .cinema::before {
            content: "";
            position: absolute;
            inset: 0;
            background-image:
                linear-gradient(28deg, transparent 48%, rgba(255, 255, 255, 0.055) 49%, transparent 50%),
                linear-gradient(-28deg, transparent 48%, rgba(255, 255, 255, 0.05) 49%, transparent 50%);
            background-size: 18vw 18vh;
            opacity: 0.6;
            pointer-events: none;
        }

        .seat-wrap {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            gap: clamp(1px, 0.12vh, 4px);
            padding: calc(clamp(34px, 4.2vh, 48px) + 1.1%) 0.55% 0;
            perspective: 1200px;
        }

        .seat-row {
            display: grid;
            grid-template-columns: 30px repeat(6, 0.5fr) 2.2vw repeat(13, 0.55fr) 2.2vw repeat(6, 0.5fr) 30px;
            align-items: center;
            gap: clamp(1px, 0.08vw, 2px);
            transform-origin: center top;
            opacity: 0.98;
        }

        .row-label {
            color: rgba(245, 234, 220, 0.48);
            font-weight: 800;
            font-size: clamp(11px, 0.78vw, 16px);
            text-align: center;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.4);
        }

        .aisle {
            height: 100%;
            min-width: 10px;
            position: relative;
        }

        .aisle::after {
            content: "";
            position: absolute;
            top: 10%;
            bottom: 10%;
            left: 50%;
            width: 1px;
            background: linear-gradient(180deg, transparent, rgba(239, 226, 205, 0.22), transparent);
        }

        .seat {
            --seat-color: var(--seat-idle);
            height: clamp(16px, 2.72vh, 34px);
            min-width: 0;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            filter: drop-shadow(0 4px 5px rgba(0, 0, 0, 0.28));
            transition: transform 0.08s ease, filter 0.08s ease, opacity 0.12s ease;
            cursor: default;
        }

        .seat::before {
            content: "";
            width: 100%;
            max-width: 42px;
            height: 100%;
            background: var(--seat-color);
            border-radius: 9px 9px 7px 7px;
            clip-path: path("M 10 12 Q 10 3 18 3 L 28 3 Q 36 3 36 12 L 36 17 Q 42 18 43 25 L 43 34 Q 43 39 38 39 L 8 39 Q 3 39 3 34 L 3 25 Q 4 18 10 17 Z");
            box-shadow: inset 0 -5px 0 rgba(0, 0, 0, 0.12), inset 0 2px 0 rgba(255, 255, 255, 0.24);
        }

        .seat::after {
            content: attr(data-seat);
            position: absolute;
            left: 50%;
            bottom: 102%;
            transform: translateX(-50%) translateY(4px);
            padding: 4px 8px;
            border-radius: 8px;
            background: rgba(10, 6, 5, 0.86);
            color: var(--screen);
            font-size: 12px;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: 0.12s ease;
            z-index: 10;
        }

        .seat:hover::after {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .seat.flash {
            --seat-color: var(--orange-2);
            transform: scale(1.22) translateY(-3px);
            filter: drop-shadow(0 0 16px rgba(230, 138, 24, 0.9));
            z-index: 4;
        }

        .seat.winner {
            --seat-color: var(--winner);
            transform: scale(1.1) translateY(-2px);
            filter: drop-shadow(0 0 18px rgba(244, 154, 17, 0.92));
            z-index: 3;
            animation: winnerPulse 1.2s ease-in-out infinite alternate;
        }

        @keyframes winnerPulse {
            from {
                filter: drop-shadow(0 0 8px rgba(244, 154, 17, 0.5));
            }

            to {
                filter: drop-shadow(0 0 22px rgba(244, 154, 17, 1));
            }
        }

        .focus-board {
            position: absolute;
            left: 50%;
            top: 1.1%;
            transform: translateX(-50%);
            min-width: min(720px, 50vw);
            height: clamp(34px, 4.2vh, 48px);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            border-radius: 24px;
            background: rgba(20, 8, 6, 0.46);
            border: 1px solid rgba(239, 226, 205, 0.12);
            backdrop-filter: blur(8px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.28);
            z-index: 5;
            pointer-events: none;
        }

        .focus-title {
            color: var(--muted);
            font-size: clamp(12px, 0.86vw, 16px);
            letter-spacing: 0.16em;
        }

        .focus-seat {
            color: var(--gold);
            font-weight: 900;
            font-size: clamp(22px, 2.7vw, 48px);
            letter-spacing: 0.08em;
            text-shadow: 0 0 28px rgba(230, 138, 24, 0.68);
            min-width: 200px;
            text-align: center;
        }

        .controls {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 14px;
        }

        .rounds {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 14px;
            flex-wrap: wrap;
        }

        button,
        .upload-btn {
            font-family: inherit;
            height: clamp(34px, 4.8vh, 56px);
            padding: 0 clamp(18px, 2vw, 42px);
            border: 1px solid rgba(239, 226, 205, 0.28);
            border-radius: 18px;
            color: var(--text);
            background: linear-gradient(180deg, rgba(198, 83, 40, 0.92), rgba(128, 50, 29, 0.92));
            font-size: clamp(14px, 1.05vw, 22px);
            font-weight: 800;
            letter-spacing: 0.06em;
            cursor: pointer;
            box-shadow: 0 14px 34px rgba(0, 0, 0, 0.32), inset 0 1px 0 rgba(255, 255, 255, 0.16);
            transition: 0.18s ease;
            white-space: nowrap;
        }

        button:hover,
        .upload-btn:hover {
            transform: translateY(-2px);
            border-color: rgba(255, 189, 74, 0.62);
            box-shadow: 0 18px 44px rgba(0, 0, 0, 0.38), 0 0 22px rgba(230, 138, 24, 0.22), inset 0 1px 0 rgba(255, 255, 255, 0.18);
        }

        button:disabled {
            opacity: 0.42;
            cursor: not-allowed;
            transform: none;
        }

        .secondary-actions {
            position: absolute;
            right: 0;
            display: flex;
            gap: 10px;
        }

        .secondary-actions button,
        .secondary-actions .upload-btn {
            padding: 0 clamp(12px, 1vw, 22px);
            font-size: clamp(12px, 0.82vw, 16px);
        }

        .ghost {
            background: rgba(245, 234, 220, 0.06);
            color: var(--muted);
        }

        .danger {
            background: rgba(127, 50, 35, 0.24);
            color: #e2a798;
            border-color: rgba(198, 83, 40, 0.34);
        }

        .upload-btn input {
            display: none;
        }

        .supp-draw {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .supp-draw input {
            font-family: inherit;
            width: clamp(48px, 4.5vw, 80px);
            height: clamp(34px, 4.8vh, 56px);
            padding: 0 8px;
            border: 1px solid rgba(239, 226, 205, 0.28);
            border-radius: 18px;
            color: var(--gold);
            background: rgba(20, 8, 6, 0.6);
            font-size: clamp(14px, 1.05vw, 22px);
            font-weight: 800;
            text-align: center;
            outline: none;
            transition: 0.18s ease;
        }

        .supp-draw input:focus {
            border-color: rgba(255, 189, 74, 0.62);
            box-shadow: 0 0 12px rgba(230, 138, 24, 0.22);
        }

        .supp-draw input::placeholder {
            color: var(--muted);
            font-weight: 400;
        }

        .modal {
            position: fixed;
            inset: 0;
            z-index: 50;
            display: none;
            align-items: center;
            justify-content: center;
            background: rgba(15, 6, 5, 0.82);
            backdrop-filter: blur(12px);
        }

        .modal.show {
            display: flex;
        }

        .modal-card {
            width: min(1180px, 86vw);
            max-height: 82vh;
            overflow: auto;
            padding: 48px;
            border-radius: 34px;
            background:
                radial-gradient(circle at 50% 0%, rgba(255, 189, 74, 0.18), transparent 36%),
                linear-gradient(180deg, rgba(198, 83, 40, 0.96), rgba(43, 18, 14, 0.96));
            border: 1px solid rgba(239, 226, 205, 0.22);
            box-shadow: 0 30px 90px rgba(0, 0, 0, 0.52);
            text-align: center;
        }

        .modal-card h2 {
            font-size: clamp(34px, 4vw, 72px);
            margin-bottom: 28px;
            color: var(--screen);
            text-shadow: 0 0 28px rgba(0, 0, 0, 0.34);
        }

        .winner-list {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 14px;
        }

        .winner-tag {
            min-width: 140px;
            padding: 14px 22px;
            border-radius: 16px;
            background: var(--screen);
            color: var(--bg);
            font-size: clamp(18px, 1.8vw, 34px);
            font-weight: 900;
            box-shadow: 0 12px 34px rgba(0, 0, 0, 0.28);
        }

        .records {
            text-align: left;
            font-size: clamp(16px, 1.2vw, 24px);
            line-height: 1.9;
        }

        .record-round {
            padding: 18px 0;
            border-bottom: 1px dashed rgba(239, 226, 205, 0.32);
        }

        .close-btn {
            margin-top: 34px;
        }

        @media (max-width: 1200px) {
            .legend {
                display: none;
            }

            .status-card {
                justify-self: end;
            }

            .secondary-actions {
                display: none;
            }
        }
    </style>
</head>

            <div class="status-card">
                <div><strong id="remainCount">500</strong><span>剩余奖券</span></div>

                <div class="legend-item"><i class="dot"></i>可抽</div>
                <div class="legend-item"><i class="dot active"></i>滚动中</div>

            </div>

        <main class="cinema">
            <section class="seat-wrap" id="seatWrap"></section>
            <div class="focus-board">
                <span class="focus-title" id="focusTitle">等待抽奖</span>
                <strong class="focus-seat" id="focusSeat">--排--座</strong>
            </div>
        </main>

        <footer class="controls">
            <div class="rounds">
                <button data-prize="三等奖" onclick="startDraw(20, '三等奖')">三等奖 · 抽 20</button>
                <button data-prize="二等奖" onclick="startDraw(5, '二等奖')">二等奖 · 抽 5</button>
                <button data-prize="一等奖" onclick="startDraw(4, '一等奖')">一等奖 · 抽 4</button>
                <div class="supp-draw">
                    <input type="number" id="suppCount" min="1" max="500" placeholder="个数" value="1">
                    <button data-supp onclick="startSuppDraw()">补抽</button>
                </div>
            </div>

                <button class="ghost" onclick="showRecords()">查看记录</button>
                <button class="ghost" onclick="exportRecords()">导出记录</button>

        </footer>

    <div class="modal" id="winnerModal">
        <div class="modal-card">
            <h2 id="winnerTitle">幸运观众：</h2>
            <div class="winner-list" id="winnerList"></div>
            <button class="close-btn" onclick="closeModal('winnerModal')">确认</button>
        </div>
    </div>

    <div class="modal" id="recordsModal">
        <div class="modal-card">
            <h2>抽奖记录</h2>
            <div class="records" id="recordsContent"></div>
            <button class="close-btn" onclick="closeModal('recordsModal')">关闭</button>
        </div>
    </div>

    <script>
        const ROWS = 20;
        const COLS = 25;
        const TOTAL = ROWS * COLS;
        const BATCH_SIZE = 10;
        let allSeats = [];
        let availableSeats = [];
        let history = [];
        let isDrawing = false;
        let isRolling = false;
        let pendingWinners = null;
        let pendingRoundName = '';
        let pendingCount = 0;
        let rollTimer = null;

        const seatWrap = document.getElementById('seatWrap');
        const focusTitle = document.getElementById('focusTitle');
        const focusSeat = document.getElementById('focusSeat');

        function seatId(row, col) {
            return `${row}排${col}座`;
        }

        function renderSeats() {
            seatWrap.innerHTML = '';
            allSeats = [];

            for (let r = 1; r <= ROWS; r++) {
                const rowEl = document.createElement('div');
                rowEl.className = 'seat-row';
                rowEl.style.transform = `scaleX(${0.86 + r * 0.006}) translateZ(${r * 0.6}px)`;

                const leftLabel = document.createElement('div');
                leftLabel.className = 'row-label';
                leftLabel.textContent = r;
                rowEl.appendChild(leftLabel);

                for (let c = 1; c <= COLS; c++) {
                    if (c === 7 || c === 20) {
                        const aisle = document.createElement('div');
                        aisle.className = 'aisle';
                        rowEl.appendChild(aisle);
                    }

                    const id = seatId(r, c);
                    allSeats.push(id);

                    const seat = document.createElement('div');
                    seat.className = 'seat';
                    seat.id = `seat-${r}-${c}`;
                    seat.dataset.seat = id;
                    seat.dataset.row = r;
                    seat.dataset.col = c;
                    rowEl.appendChild(seat);
                }

                const rightLabel = document.createElement('div');
                rightLabel.className = 'row-label';
                rightLabel.textContent = r;
                rowEl.appendChild(rightLabel);
                seatWrap.appendChild(rowEl);
            }
        }

        function getSeatEl(name) {
            const match = name.match(/^(\d+)排(\d+)座$/);
            if (!match) return null;
            return document.getElementById(`seat-${match[1]}-${match[2]}`);
        }

        function loadState() {
            history = JSON.parse(localStorage.getItem('cinema_lottery_history') || '[]');
            const drawn = history.flatMap(item => item.winners);
            availableSeats = allSeats.filter(item => !drawn.includes(item));

            document.querySelectorAll('.seat').forEach(el => {
                el.classList.remove('winner', 'flash');
            });

            drawn.forEach(name => {
                const el = getSeatEl(name);
                if (el) el.classList.add('winner');
            });

            updateStats();
            updatePrizeButtons();
        }

        function updateStats() {
            document.getElementById('remainCount').textContent = availableSeats.length;
            document.getElementById('drawnCount').textContent = TOTAL - availableSeats.length;
        }

        function updatePrizeButtons() {
            const drawnPrizes = new Set(history.map(item => item.roundName));
            document.querySelectorAll('[data-prize]').forEach(button => {
                const used = drawnPrizes.has(button.dataset.prize);
                button.disabled = used || isDrawing;
                if (used) button.textContent = `${button.dataset.prize} · 已抽取`;
            });
        }

        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        function pickWinners(count) {
            const winners = [];
            for (let i = 0; i < count; i++) {
                const randomIndex = Math.floor(Math.random() * availableSeats.length);
                const winner = availableSeats.splice(randomIndex, 1)[0];
                winners.push(winner);
            }
            return winners;
        }

        function randomSeats(count) {
            const pool = [...availableSeats];
            const seats = [];
            const limit = Math.min(count, pool.length);
            for (let i = 0; i < limit; i++) {
                const randomIndex = Math.floor(Math.random() * pool.length);
                seats.push(pool.splice(randomIndex, 1)[0]);
            }
            return seats;
        }

        function clearFlash() {
            document.querySelectorAll('.seat.flash').forEach(el => el.classList.remove('flash'));
        }

        function startRolling(count) {
            isRolling = true;
            function tick() {
                if (!isRolling) return;
                clearFlash();
                randomSeats(count).forEach(name => {
                    const el = getSeatEl(name);
                    if (el) el.classList.add('flash');
                });
                focusSeat.textContent = count >= 10 ? `${count} 位` : randomSeats(1)[0] || '--排--座';
                rollTimer = setTimeout(tick, 50);
            }
            tick();
        }

        function stopRolling() {
            isRolling = false;
            if (rollTimer) { clearTimeout(rollTimer); rollTimer = null; }
            clearFlash();
        }

        async function startDraw(count, roundName) {
            if (isDrawing) {
                // already rolling — this click means "stop"
                if (isRolling) {
                    stopRolling();
                    await revealWinners();
                }
                return;
            }
            if (history.some(item => item.roundName === roundName)) return;
            if (availableSeats.length < count) {
                alert(`剩余奖券不足，仅剩 ${availableSeats.length} 张`);
                return;
            }

            isDrawing = true;
            pendingRoundName = roundName;
            pendingCount = count;
            pendingWinners = pickWinners(count);

            // Disable all buttons except the active one
            document.querySelectorAll('.controls button').forEach(btn => btn.disabled = true);
            const activeBtn = document.querySelector(`[data-prize="${roundName}"]`);
            if (activeBtn) {
                activeBtn.disabled = false;
                activeBtn.textContent = '停止';
            }

            focusTitle.textContent = roundName;
            startRolling(count);
        }

        async function revealWinners() {
            const winners = pendingWinners;
            const count = pendingCount;
            const roundName = pendingRoundName;

            // Highlight winners
            winners.forEach(name => {
                const el = getSeatEl(name);
                if (el) el.classList.add('flash');
            });
            focusSeat.textContent = `${count} 位`;
            await sleep(520);
            winners.forEach(name => {
                const el = getSeatEl(name);
                if (el) {
                    el.classList.remove('flash');
                    el.classList.add('winner');
                }
            });
            await sleep(260);

            saveRecord(roundName, count, winners);
            focusTitle.textContent = `${roundName}完成`;
            focusSeat.textContent = `${winners.length} 位`;
            isDrawing = false;
            pendingWinners = null;
            document.querySelectorAll('.controls button').forEach(btn => btn.disabled = false);
            updatePrizeButtons();
            showWinnerModal(winners);
        }

        async function startSuppDraw() {
            // If already rolling from a supp draw, stop it
            if (isDrawing && isRolling && pendingRoundName.startsWith('补抽')) {
                stopRolling();
                await revealWinners();
                return;
            }
            if (isDrawing) return;

            const input = document.getElementById('suppCount');
            const count = parseInt(input.value, 10);
            if (!count || count < 1) {
                alert('请输入有效的补抽个数');
                return;
            }
            if (availableSeats.length < count) {
                alert(`剩余奖券不足，仅剩 ${availableSeats.length} 张`);
                return;
            }

            const suppIndex = history.filter(item => item.roundName.startsWith('补抽')).length + 1;
            const roundName = `补抽${suppIndex}`;

            isDrawing = true;
            pendingRoundName = roundName;
            pendingCount = count;
            pendingWinners = pickWinners(count);

            document.querySelectorAll('.controls button').forEach(btn => btn.disabled = true);
            const suppBtn = document.querySelector('[data-supp]');
            if (suppBtn) {
                suppBtn.disabled = false;
                suppBtn.textContent = '停止';
            }

            focusTitle.textContent = roundName;
            startRolling(count);
        }

        function saveRecord(roundName, count, winners) {
            history.push({
                roundName,
                count,
                winners,
                time: new Date().toLocaleString()
            });
            localStorage.setItem('cinema_lottery_history', JSON.stringify(history));
        }

        function showWinnerModal(winners) {
            document.getElementById('winnerTitle').textContent = '幸运观众：';
            const list = document.getElementById('winnerList');
            list.innerHTML = '';
            winners.forEach(winner => {
                const tag = document.createElement('div');
                tag.className = 'winner-tag';
                tag.textContent = winner;
                list.appendChild(tag);
            });
            document.getElementById('winnerModal').classList.add('show');
        }

        function closeModal(id) {
            document.getElementById(id).classList.remove('show');
        }

        function showRecords() {
            const box = document.getElementById('recordsContent');
            if (!history.length) {
                box.innerHTML = '暂无抽奖记录';
            } else {
                box.innerHTML = history.map((item, index) => `
                <div class="record-round">
                    <strong>${item.roundName} · 抽取 ${item.count} 人</strong><br>
                    <span>${item.time}</span><br>
                    幸运观众：${item.winners.join('、')}
                </div>
            `).join('');
            }
            document.getElementById('recordsModal').classList.add('show');
        }

        function exportRecords() {
            const lines = ['清华大学医学院第24届学生节 |【文医复兴】抽奖记录', `导出时间：${new Date().toLocaleString()}`, ''];
            history.forEach(item => {
                lines.push(`${item.roundName}`);
                lines.push(`时间：${item.time}`);
                lines.push(`幸运观众：${item.winners.join('、')}`);
                lines.push('');
            });
            const blob = new Blob([lines.join('\n')], { type: 'text/plain;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = '清华大学医学院第24届学生节_文医复兴_抽奖记录.txt';
            a.click();
            URL.revokeObjectURL(url);
        }

        function clearRecords() {
            if (!confirm('确定要清空所有中奖记录并重置座位吗？')) return;
            localStorage.removeItem('cinema_lottery_history');
            history = [];
            availableSeats = [...allSeats];
            document.querySelectorAll('.seat').forEach(el => el.classList.remove('winner', 'flash'));
            focusTitle.textContent = '等待抽奖';
            focusSeat.textContent = '--排--座';
            document.querySelectorAll('[data-prize]').forEach(button => {
                const count = button.dataset.prize === '三等奖' ? 20 : button.dataset.prize === '二等奖' ? 5 : 4;
                button.textContent = `${button.dataset.prize} · 抽 ${count}`;
                button.disabled = false;
            });
            document.getElementById('suppCount').value = 1;
            updateStats();
        }


        renderSeats();
        loadState();
    </script>
</body>

</html>
